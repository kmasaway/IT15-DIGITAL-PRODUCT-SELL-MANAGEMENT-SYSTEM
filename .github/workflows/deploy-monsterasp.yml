name: Deploy to MonsterASP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate deployment secrets
        shell: pwsh
        env:
          MONSTERASP_PUBLISH_URL: ${{ secrets.MONSTERASP_PUBLISH_URL }}
          MONSTERASP_SITE_NAME: ${{ secrets.MONSTERASP_SITE_NAME }}
          MONSTERASP_USERNAME: ${{ secrets.MONSTERASP_USERNAME }}
          MONSTERASP_PASSWORD: ${{ secrets.MONSTERASP_PASSWORD }}
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
        run: |
          $missing = @()
          foreach ($name in @(
            'MONSTERASP_PUBLISH_URL',
            'MONSTERASP_SITE_NAME',
            'MONSTERASP_USERNAME',
            'MONSTERASP_PASSWORD',
            'DB_CONNECTION_STRING',
            'TOKEN_SECRET'
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            throw "Missing GitHub Actions secret(s): $($missing -join ', ')"
          }

      - name: Build React
        working-directory: corek-ui
        run: |
          npm ci
          npm run build

      - name: Copy React build to ASP.NET wwwroot
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path CoreK.API/wwwroot | Out-Null
          Copy-Item -Path corek-ui/dist/* -Destination CoreK.API/wwwroot -Recurse -Force

      - name: Create production config
        shell: pwsh
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
        run: |
          $config = @{
            ConnectionStrings = @{
              DefaultConnection = $env:DB_CONNECTION_STRING
            }
            AppSettings = @{
              TokenSecret = $env:TOKEN_SECRET
            }
            Cors = @{
              AllowedOrigins = @(
                "https://corek.runasp.net",
                "http://corek.runasp.net"
              )
            }
            AllowedHosts = "*"
          }

          $config | ConvertTo-Json -Depth 10 | Set-Content CoreK.API/appsettings.Production.json

      - name: Publish ASP.NET Core
        run: dotnet publish CoreK.API/CoreK.API.csproj -c Release -o publish-monsterasp -p:UseAppHost=false

      - name: Deploy to MonsterASP
        shell: pwsh
        env:
          MONSTERASP_PUBLISH_URL: ${{ secrets.MONSTERASP_PUBLISH_URL }}
          MONSTERASP_SITE_NAME: ${{ secrets.MONSTERASP_SITE_NAME }}
          MONSTERASP_USERNAME: ${{ secrets.MONSTERASP_USERNAME }}
          MONSTERASP_PASSWORD: ${{ secrets.MONSTERASP_PASSWORD }}
        run: |
          $msdeployCandidates = @(
            "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe",
            "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          )
          $msdeploy = $msdeployCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $msdeploy) {
            throw "Web Deploy msdeploy.exe was not found on the runner."
          }

          $sourcePath = (Resolve-Path "publish-monsterasp").Path
          $computerName = "https://$env:MONSTERASP_PUBLISH_URL`:8172/msdeploy.axd?site=$env:MONSTERASP_SITE_NAME"
          $destination = "contentPath='$env:MONSTERASP_SITE_NAME',computerName='$computerName',userName='$env:MONSTERASP_USERNAME',password='$env:MONSTERASP_PASSWORD',authType='Basic'"

          & $msdeploy `
            -verb:sync `
            "-source:contentPath='$sourcePath'" `
            "-dest:$destination" `
            -allowUntrusted `
            -enableRule:AppOffline
